name: DynamicLyrics
options:
  bundleIdPrefix: com.marco
  deploymentTarget:
    iOS: "18.0"
targets:
  DynamicLyrics:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Dynamic Lyrics
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        UIBackgroundModes: [audio]
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.marco.dynamiclyrics
            CFBundleURLSchemes: [dynamiclyrics]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marco.dynamiclyrics
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
    dependencies:
      - target: LyricsWidget
  LyricsWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Lyrics Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marco.dynamiclyrics.widget
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
