name: Build unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive (unsigned)
        run: |
          xcodebuild archive \
            -project DynamicLyrics.xcodeproj \
            -scheme DynamicLyrics \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/DynamicLyrics.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R "build/DynamicLyrics.xcarchive/Products/Applications/DynamicLyrics.app" Payload/
          zip -qry DynamicLyrics.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DynamicLyrics-unsigned-ipa
          path: DynamicLyrics.ipa
